<!DOCTYPE html>
<html>
<head>
    <title>Smart Bus Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height:100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://schoollog.in/assets/images/bus_attendance/2.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container {
            background: rgba(255,255,255,0.95);
            padding:40px;
            width:90%;
            max-width:400px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            text-align:center;
        }

        h2 {
            margin-bottom:10px;
            color:#2c3e50;
        }

        p {
            margin-bottom:25px;
            color:#555;
            font-size:14px;
        }

        input {
            width:100%;
            padding:12px;
            border-radius:8px;
            border:1px solid #ccc;
            margin-bottom:20px;
            font-size:16px;
        }

        button {
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#007BFF;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover {
            background:#0056b3;
        }

        .footer {
            margin-top:15px;
            font-size:12px;
            color:#777;
        }

    </style>
</head>

<body>

<div class="container">
    <h2>🚍 Smart Bus Attendance</h2>
    <p>Scan QR & Enter Roll Number</p>

    <form id="attendanceForm">
        <input type="text" id="rollno" placeholder="Enter Roll Number" required>
        <button type="submit">Submit Attendance</button>
    </form>

    <div class="footer">
        Secure • Real-Time • Automated System
    </div>
</div>

<script>
document.getElementById("attendanceForm").addEventListener("submit", function(e){
    e.preventDefault();

    const rollno = document.getElementById("rollno").value;

    fetch("https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrTCywBSHH9UJc22o9Vc52g3JJMcieU_EeZNxzz8Tu0db3Sa0Ns-Ub9E9nj42aogVe5WQS6esjXgWhzPsC5a_XZ4vC5OpPpm_LEZDrWIbuVyP7Vy2dResG8NskObhgx0sQes17wNNsCzORGSLA9Lc_eCOtnVbVxeqxfVc7ip9jb_TbBFFXJUL3X2LOPdDFLuac8IfjSEQnTMDnbAMXrO-h3UEvP25Vlx1el4NvwSi-M9EaRsog6ecNCEMs9yW6BCmMTNluIgVO0KB4mc1fdsWBhqGdIw0Q&lib=M6lD-3iBEuXpr385kJl2Ey9BpqG-IekUq", {
        method: "POST",
        body: new URLSearchParams({
            rollno: rollno
        })
    })
    .then(response => response.text())
    .then(data => {
        alert("Attendance Submitted Successfully ✅");
        document.getElementById("attendanceForm").reset();
    })
    .catch(error => {
        alert("Error submitting attendance ❌");
    });
});
</script>

</body>
</html>

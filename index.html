<!DOCTYPE html>
<html>
<head>
    <title>Smart Bus Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height:100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://schoollog.in/assets/images/bus_attendance/2.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container {
            background: rgba(255,255,255,0.95);
            padding:40px;
            width:90%;
            max-width:400px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            text-align:center;
        }

        h2 { margin-bottom:10px; color:#2c3e50; }

        p { margin-bottom:25px; color:#555; font-size:14px; }

        input {
            width:100%;
            padding:12px;
            border-radius:8px;
            border:1px solid #ccc;
            margin-bottom:20px;
            font-size:16px;
        }

        button {
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#007BFF;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover { background:#0056b3; }

        .footer {
            margin-top:15px;
            font-size:12px;
            color:#777;
        }

        /* Success Popup */
        .popup {
            display:none;
            position:fixed;
            top:20px;
            right:20px;
            background:#28a745;
            color:white;
            padding:15px 25px;
            border-radius:8px;
            box-shadow:0 5px 15px rgba(0,0,0,0.3);
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🚍 Smart Bus Attendance</h2>
    <p>Scan QR & Enter Roll Number</p>

    <!-- Hidden iframe to avoid new tab -->
    <iframe name="hiddenFrame" style="display:none;"></iframe>

    <form method="POST"
          action="https://script.google.com/macros/s/AKfycbx7ilVGXTy9MvgWsbuXw4-udgsGa0SpUb-Vf0lVXIaNXbvVc02QyhkOyD5lVHvqoG4M/exec"
          target="hiddenFrame"
          onsubmit="showPopup()">

        <input type="text" name="rollno" placeholder="Enter Roll Number" required>
        <button type="submit">Submit Attendance</button>

    </form>

    <div class="footer">
        Secure • Real-Time • Automated System
    </div>
</div>

<div class="popup" id="successPopup">
    Attendance Submitted Successfully ✅
</div>

<script>
function showPopup(){
    setTimeout(function(){
        var popup = document.getElementById("successPopup");
        popup.style.display = "block";

        setTimeout(function(){
            popup.style.display = "none";
        }, 3000);

        document.querySelector("form").reset();
    }, 500);
}
</script>

</body>
</html>
